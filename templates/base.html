<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}HEZI STOCK{% endblock %}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    {% block head %}{% endblock %}
</head>

<body class="bg-slate-50 text-slate-800">

    <!-- NAVBAR -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-slate-900 text-white rounded-xl flex items-center justify-center font-bold">
                    H
                </div>
                <span class="font-semibold text-lg">HEZI STOCK</span>
                <span class="text-xs text-slate-400">v{{ version }}</span>
            </div>

            <nav class="flex gap-4 text-sm">
                <a href="/app" class="hover:text-blue-600">Dashboard</a>
                <a href="/settings" class="hover:text-blue-600">Settings</a>
                <a href="/reports" class="hover:text-blue-600">Reports</a>
                <a href="/chart" class="hover:text-blue-600">Chart</a>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="border-t mt-12 bg-white">
        <div class="max-w-6xl mx-auto px-4 py-6 text-xs text-slate-400">
            HEZI STOCK v{{ version }} — Not financial advice.
        </div>
    </footer>

</body>
</html>
